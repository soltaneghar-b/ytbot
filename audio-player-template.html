<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Player</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:system-ui, -apple-system, sans-serif; }
  .player { background:#1a1a1a; padding:24px; border-radius:16px; color:#fff; width:90%; max-width:420px; box-shadow:0 10px 30px rgba(0,0,0,0.5); text-align:center; position:relative; }
  h3 { margin:0 0 16px; font-size:20px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  audio { display:none; }
  .spinner { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:3; }
  .spinner::after { content:''; display:block; width:48px; height:48px; border:4px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .error-overlay { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); color:#fff; justify-content:center; align-items:center; border-radius:16px; }
  .error-overlay p { font-size:16px; padding:20px; }
  .progress-bar-wrap { position:relative; width:100%; height:8px; background:rgba(255,255,255,0.15); border-radius:4px; cursor:pointer; margin:16px 0 8px; }
  .buffered-fill { position:absolute; top:0; left:0; height:100%; background:rgba(255,255,255,0.25); border-radius:4px; width:0%; }
  .progress-fill { position:absolute; top:0; left:0; height:100%; background:#ff3b30; border-radius:4px; width:0%; }
  .progress-thumb { position:absolute; top:50%; transform:translate(-50%,-50%); width:16px; height:16px; background:#ff3b30; border-radius:50%; display:none; }
  .time-info { display:flex; justify-content:space-between; font-size:12px; color:#aaa; margin-bottom:16px; }
  .controls { display:flex; align-items:center; justify-content:center; gap:12px; flex-wrap:wrap; }
  button { background:transparent; border:none; color:#fff; cursor:pointer; font-size:24px; min-width:48px; min-height:48px; display:flex; justify-content:center; align-items:center; border-radius:8px; transition:background 0.2s; }
  button:hover { background:rgba(255,255,255,0.15); }
  button:active { background:rgba(255,255,255,0.25); }
  button.active { color:#ff3b30; }
  .volume-slider { width:80px; height:6px; -webkit-appearance:none; appearance:none; background:rgba(255,255,255,0.3); border-radius:3px; outline:none; padding: 10px 0; }  /* larger touch target */
  .volume-slider::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:#ff3b30; cursor:pointer; }
  .speed-select { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#fff; padding:6px 10px; border-radius:8px; font-size:16px; outline:none; }
  .download-btn { display:inline-block; background:#ff3b30; color:#fff; padding:12px 24px; border:none; border-radius:8px; cursor:pointer; font-size:16px; text-decoration:none; margin-top:20px; }
  .download-btn:hover { background:#e0352b; }
  .download-btn:disabled { opacity:0.5; cursor:not-allowed; }
</style>
</head>
<body>
<div class="player" id="playerContainer">
  <audio id="audioElement" src="__AUDIO_URL__"></audio>
  <div class="spinner" id="spinner"></div>
  <div class="error-overlay" id="errorOverlay"><p id="errorMessage">Error loading audio. Please try again.</p></div>
  
  <h3 id="audioTitle">__AUDIO_TITLE__</h3>
  
  <div class="progress-bar-wrap" id="progressBar">
    <div class="buffered-fill" id="bufferedFill"></div>
    <div class="progress-fill" id="progressFill"></div>
    <div class="progress-thumb" id="progressThumb"></div>
  </div>
  <div class="time-info">
    <span id="currentTime">0:00</span>
    <span id="duration">0:00</span>
  </div>

  <div class="controls">
    <button id="playBtn" aria-label="Play">▶</button>
    <button id="backwardBtn" aria-label="Skip backward 10 seconds">⏪</button>
    <button id="forwardBtn" aria-label="Skip forward 10 seconds">⏩</button>
    <button id="muteBtn" aria-label="Unmuted">🔊</button>
    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100" aria-label="Volume">
    <select class="speed-select" id="speedSelect" aria-label="Playback speed">
      <option value="0.5">0.5x</option>
      <option value="0.75">0.75x</option>
      <option value="1" selected>1x</option>
      <option value="1.25">1.25x</option>
      <option value="1.5">1.5x</option>
      <option value="2">2x</option>
    </select>
    <button id="loopBtn" aria-label="Loop off">🔁</button>
  </div>

  <a class="download-btn" id="downloadBtn" href="__ZIP_URL__" download aria-label="Download ZIP">⬇ Download ZIP</a>
</div>

<script>
(function() {
  const audio = document.getElementById('audioElement');
  const playBtn = document.getElementById('playBtn');
  const backwardBtn = document.getElementById('backwardBtn');
  const forwardBtn = document.getElementById('forwardBtn');
  const muteBtn = document.getElementById('muteBtn');
  const volumeSlider = document.getElementById('volumeSlider');
  const speedSelect = document.getElementById('speedSelect');
  const loopBtn = document.getElementById('loopBtn');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const bufferedFill = document.getElementById('bufferedFill');
  const progressThumb = document.getElementById('progressThumb');
  const curTimeDisplay = document.getElementById('currentTime');
  const durDisplay = document.getElementById('duration');
  const spinner = document.getElementById('spinner');
  const errorOverlay = document.getElementById('errorOverlay');
  const downloadBtn = document.getElementById('downloadBtn');
  const audioTitle = document.getElementById('audioTitle');

  // Default title fallback
  if (!audioTitle.textContent.trim() || audioTitle.textContent === '__AUDIO_TITLE__') {
    audioTitle.textContent = '🎵 Audio';
  }

  // Show/hide download button based on valid URL
  const zipUrl = downloadBtn.getAttribute('href');
  if (!zipUrl || zipUrl === '__ZIP_URL__' || zipUrl === '#') {
    downloadBtn.style.display = 'none';
  }

  let isLooping = false;
  let isDragging = false;
  let lastVolume = 1.0;   // smart mute: remember last actual volume

  // Play/Pause
  playBtn.addEventListener('click', () => {
    if (audio.paused) {
      audio.play().catch(() => {});
      playBtn.textContent = '⏸';
      playBtn.setAttribute('aria-label', 'Pause');
    } else {
      audio.pause();
      playBtn.textContent = '▶';
      playBtn.setAttribute('aria-label', 'Play');
    }
  });

  // Forward/Backward
  backwardBtn.addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime - 10); });
  forwardBtn.addEventListener('click', () => { audio.currentTime = Math.min(audio.duration || Infinity, audio.currentTime + 10); });

  // Mute/Unmute (smart mute: remember previous volume)
  muteBtn.addEventListener('click', () => {
    if (audio.muted || audio.volume === 0) {
      // Unmute / restore volume
      audio.muted = false;
      audio.volume = lastVolume > 0 ? lastVolume : 0.5;
      volumeSlider.value = audio.volume * 100;
    } else {
      // Mute and store current volume
      lastVolume = audio.volume;
      audio.muted = true;
      volumeSlider.value = 0;
    }
    updateMuteIcon();
  });

  function updateMuteIcon() {
    if (audio.muted || audio.volume === 0) {
      muteBtn.textContent = '🔇';
      muteBtn.setAttribute('aria-label', 'Muted');
    } else if (audio.volume < 0.34) {
      muteBtn.textContent = '🔈';
      muteBtn.setAttribute('aria-label', 'Low volume');
    } else if (audio.volume < 0.67) {
      muteBtn.textContent = '🔉';
      muteBtn.setAttribute('aria-label', 'Medium volume');
    } else {
      muteBtn.textContent = '🔊';
      muteBtn.setAttribute('aria-label', 'High volume');
    }
  }

  volumeSlider.addEventListener('input', (e) => {
    const newVol = e.target.value / 100;
    audio.volume = newVol;
    audio.muted = false;            // unmute when slider is moved
    if (newVol > 0) lastVolume = newVol;
    updateMuteIcon();
  });

  // Playback speed
  speedSelect.addEventListener('change', (e) => { audio.playbackRate = parseFloat(e.target.value); });

  // Loop toggle
  loopBtn.addEventListener('click', () => {
    isLooping = !isLooping;
    audio.loop = isLooping;
    loopBtn.classList.toggle('active', isLooping);
    loopBtn.setAttribute('aria-label', isLooping ? 'Loop on' : 'Loop off');
  });

  // Loading / Error
  audio.addEventListener('waiting', () => { spinner.style.display = 'block'; });
  audio.addEventListener('canplay', () => { spinner.style.display = 'none'; errorOverlay.style.display = 'none'; });
  audio.addEventListener('playing', () => { spinner.style.display = 'none'; errorOverlay.style.display = 'none'; });
  audio.addEventListener('error', () => {
    spinner.style.display = 'none';
    errorOverlay.style.display = 'flex';
  });

  // Progress & buffered
  audio.addEventListener('timeupdate', () => {
    const duration = audio.duration || 0;
    const pct = duration ? (audio.currentTime / duration) * 100 : 0;
    progressFill.style.width = pct + '%';
    progressThumb.style.left = pct + '%';
    progressThumb.style.display = 'block';
    curTimeDisplay.textContent = formatTime(audio.currentTime);
    playBtn.textContent = audio.paused ? '▶' : '⏸';
  });

  audio.addEventListener('progress', () => {
    if (audio.buffered.length > 0) {
      const bufferedEnd = audio.buffered.end(audio.buffered.length - 1);
      const duration = audio.duration || 1;
      bufferedFill.style.width = (bufferedEnd / duration) * 100 + '%';
    }
  });

  audio.addEventListener('loadedmetadata', () => {
    durDisplay.textContent = formatTime(audio.duration || 0);
    progressThumb.style.display = 'block';
  });

  // Progress bar seeking
  function seek(e) {
    const rect = progressBar.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    audio.currentTime = ratio * audio.duration;
  }
  progressBar.addEventListener('mousedown', (e) => { isDragging = true; seek(e); });
  progressBar.addEventListener('touchstart', (e) => { isDragging = true; seek(e); });
  document.addEventListener('mousemove', (e) => { if (isDragging) seek(e); });
  document.addEventListener('touchmove', (e) => { if (isDragging) seek(e); }, {passive: false});
  document.addEventListener('mouseup', () => { isDragging = false; });
  document.addEventListener('touchend', () => { isDragging = false; });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
    switch (e.key) {
      case ' ': e.preventDefault(); playBtn.click(); break;
      case 'm': muteBtn.click(); break;
      case 'ArrowLeft': e.preventDefault(); backwardBtn.click(); break;
      case 'ArrowRight': e.preventDefault(); forwardBtn.click(); break;
      case 'ArrowUp': e.preventDefault(); volumeSlider.value = Math.min(100, (+volumeSlider.value || 0) + 5); volumeSlider.dispatchEvent(new Event('input')); break;
      case 'ArrowDown': e.preventDefault(); volumeSlider.value = Math.max(0, (+volumeSlider.value || 0) - 5); volumeSlider.dispatchEvent(new Event('input')); break;
      case 'l': loopBtn.click(); break;
    }
  });

  // Improved time formatting with optional hours
  function formatTime(s) {
    if (isNaN(s) || !isFinite(s)) return '0:00';
    const t = Math.floor(s);
    const h = Math.floor(t / 3600);
    const m = Math.floor((t % 3600) / 60);
    const sec = t % 60;
    const paddedSec = sec < 10 ? '0' + sec : sec;
    if (h > 0) {
      return `${h}:${m < 10 ? '0' + m : m}:${paddedSec}`;
    }
    return `${m}:${paddedSec}`;
  }
})();
</script>
</body>
</html>
