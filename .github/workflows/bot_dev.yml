# bot_dev.yml
name: 🤖 YouTube Streamer Dispatcher (Dev)

on:
  workflow_dispatch:
    inputs:
      offset:
        description: 'Update offset to start from'
        required: false
        type: string
        default: ''

concurrency:
  group: yt-streamer-bot-dev
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: 🔐 Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "ytbot,ytbot_rust_dev,st1,st2,st3,st4,st5,st6,st7,st8,st9,st10,st11,st12,st13,st14,st15,st16,st17,st18,st19,st20,st21,st22,st23,st24,st25,st26,st27,st28,st29,st30,st31,st32,st33,st34,st35,st36,st37,st38,st39,st40,st41,st42,st43,st44,st45,st46,st47,st48,st49,st50,yt-streamer-config"

      - name: 🔐 Stream app token 1
        id: stream-token-1
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.STREAM1_APP_ID }}
          private-key: ${{ secrets.STREAM1_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "st1,st2,st3,st4,st5,st6,st7,st8,st9,st10,st11,st12,st13,st14,st15,st16,st17,st18,st19,st20,st21,st22,st23,st24,st25,st26,st27,st28,st29,st30,st31,st32,st33,st34,st35,st36,st37,st38,st39,st40,st41,st42,st43,st44,st45,st46,st47,st48,st49,st50,yt-streamer-config"

      - name: 🔐 Stream app token 2
        id: stream-token-2
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.STREAM2_APP_ID }}
          private-key: ${{ secrets.STREAM2_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "st1,st2,st3,st4,st5,st6,st7,st8,st9,st10,st11,st12,st13,st14,st15,st16,st17,st18,st19,st20,st21,st22,st23,st24,st25,st26,st27,st28,st29,st30,st31,st32,st33,st34,st35,st36,st37,st38,st39,st40,st41,st42,st43,st44,st45,st46,st47,st48,st49,st50,yt-streamer-config"

      - name: 🛑 Prevent overlapping runs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          RUNS=$(gh api "repos/$OWNER/$REPO/actions/runs?status=in_progress&branch=main&per_page=10" -q ".workflow_runs[] | select(.id != ($CURRENT_RUN_ID|tonumber)) | .id")
          if [ -n "$RUNS" ]; then
            echo "🛑 Another instance is in progress (run IDs: $RUNS). Exiting."
            exit 0
          fi
          echo "✅ No other instances running. Proceeding."

      - name: 📥 Download bot binary from private dev repo
        run: |
          echo "📥 Downloading binary..."
          curl -fSL --retry 3 -o yt-streamer-bot \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            "https://raw.githubusercontent.com/${{ github.repository_owner }}/ytbot_rust_dev/refs/heads/bot-binary/yt-streamer-bot"
          chmod +x yt-streamer-bot
          echo "✅ Download complete"

      - name: 🧰 Install yt-dlp
        run: pip install yt-dlp==2026.3.17

      - name: 🚀 Run bot
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN_DEV }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          BOT_REPO: ${{ github.event.repository.name }}
          STREAMER_REPO_PREFIX: 'st'
          STREAMER_REPO_COUNT: '50'
          OFFSET: ${{ github.event.inputs.offset || '' }}
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}
          STATE_BRANCH: 'bot-state-dev'
          REQUIRED_CHANNEL_ID: ${{ secrets.REQUIRED_CHANNEL_ID }}
          REQUIRED_CHANNEL_LINK: ${{ secrets.REQUIRED_CHANNEL_LINK }}
          PRIVATE_REPO: 'ytbot_rust_dev'
          DB_BRANCH: 'bot-db'
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          SEARCH_RESULTS_REPO: 'yt-streamer-config'
          BOT_ENV: "dev"
          STREAM_GITHUB_TOKEN: ${{ steps.stream-token-1.outputs.token }}
          STREAM_GITHUB_TOKEN2: ${{ steps.stream-token-2.outputs.token }}
        run: ./yt-streamer-bot
