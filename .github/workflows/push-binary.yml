name: 📤 Push Binary to Private Repo

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target private repository'
        required: true
        type: choice
        options:
          - ytbot_rust_dev
          - ytbot_rust

jobs:
  push-binary:
    runs-on: ubuntu-latest
    steps:
      - name: 🔐 Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.inputs.target_repo }}

      - name: 📥 Download pre‑built binary
        run: |
          echo "⬇️ Downloading binary..."
          curl -fSL --retry 3 -o yt-streamer-bot "${{ secrets.BINARY_DOWNLOAD_URL }}"
          chmod +x yt-streamer-bot
          echo "✅ Download complete"

      - name: 🚀 Push to bot‑binary branch
        env:
          TARGET_REPO: ${{ github.event.inputs.target_repo }}
          TOKEN: ${{ steps.app-token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          mkdir /tmp/push-binary && cd /tmp/push-binary
          git init
          git remote add origin "https://x-access-token:${TOKEN}@github.com/${OWNER}/${TARGET_REPO}.git"

          cp "$GITHUB_WORKSPACE/yt-streamer-bot" .
          git add yt-streamer-bot
          git commit -m "Update bot binary [skip ci]"
          git push origin "HEAD:bot-binary" --force
          echo "✅ Binary pushed to ${TARGET_REPO}/bot-binary"
