name: 🔽 General File Downloader (with Auth)

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🔗 Download URL'
        required: true
        type: string
      filename:
        description: '💾 File name (optional, auto-detected if empty)'
        required: false
        type: string
        default: ''
      auth_token:
        description: '🔐 Auth token (GitHub token or PAT). Use secrets.GITHUB_TOKEN for GitHub artifacts / logs'
        required: false
        type: string
        default: ''
      split_threshold_mb:
        description: '📦 Split files larger than (MB) — 0 = never'
        required: false
        type: number
        default: 0

jobs:
  download:
    name: ⬇️ Download & Push
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      BRANCH_NAME: download-${{ github.run_id }}
      HARD_LIMIT_MB: 90
    steps:
      - name: 💾 Check available disk space
        run: |
          AVAIL_KB=$(df /home/runner | awk 'NR==2 {print $4}')
          AVAIL_MB=$((AVAIL_KB / 1024))
          echo "📀 Available space: ${AVAIL_MB} MB"
          if [[ $AVAIL_MB -lt 2048 ]]; then
            echo "❌ Less than 2 GB free, aborting"
            exit 1
          fi

      # ---------- (optional) refresh GitHub‑signed log URL ----------
      - name: 🔄 Refresh GitHub Actions log download URL
        id: refresh
        run: |
          set -euo pipefail
          URL="${{ github.event.inputs.url }}"
          TOKEN="${{ github.event.inputs.auth_token }}"

          # Only refresh if it’s a GitHub Actions log endpoint and token is present
          if [[ "$URL" =~ ^https://results-receiver\.actions\.githubusercontent\.com/rest/runs/.*/logs ]] && [[ -n "$TOKEN" ]]; then
            echo "🔍 Detected GitHub Actions log URL – fetching fresh download link..."
            # Extract the run ID from the URL
            RUN_ID=$(echo "$URL" | sed -n 's|.*/runs/\([0-9]\+\)/logs.*|\1|p')
            if [[ -z "$RUN_ID" ]]; then
              echo "⚠️ Could not extract run ID, using original URL"
            else
              # Use the GitHub API to obtain a new signed download URL
              FRESH=$(curl -sS -H "Authorization: Bearer $TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID/logs" \
                -o /dev/null -w '%{redirect_url}')
              if [[ -n "$FRESH" ]]; then
                echo "✅ New download URL obtained"
                echo "url=$FRESH" >> $GITHUB_OUTPUT
              else
                echo "⚠️ Could not refresh URL, using original"
                echo "url=$URL" >> $GITHUB_OUTPUT
              fi
            fi
          else
            echo "url=$URL" >> $GITHUB_OUTPUT
          fi

      # ---------- download ----------
      - name: ⬇️ Download file
        id: download
        run: |
          set -euo pipefail
          exec 2>&1

          URL="${{ steps.refresh.outputs.url || github.event.inputs.url }}"
          CUSTOM_FILENAME="${{ github.event.inputs.filename }}"
          TOKEN="${{ github.event.inputs.auth_token }}"

          # Determine filename
          if [[ -n "$CUSTOM_FILENAME" ]]; then
            FILENAME="$CUSTOM_FILENAME"
          else
            FILENAME=$(basename "$URL" | cut -d'?' -f1)
            if [[ -z "$FILENAME" || "$FILENAME" == "/" ]]; then
              FILENAME="download"
            fi
          fi

          echo "🔗 URL: $URL"
          echo "📄 Target filename: $FILENAME"
          echo "🔐 Token present: $([[ -n "$TOKEN" ]] && echo 'yes' || echo 'no')"

          TEMP_DIR="./downloads"
          mkdir -p "$TEMP_DIR"
          OUTPUT="$TEMP_DIR/$FILENAME"

          # Build curl headers
          HEADERS=(-H "User-Agent: GitHub-Actions-Downloader")
          if [[ -n "$TOKEN" ]]; then
            HEADERS+=(-H "Authorization: Bearer $TOKEN")
          fi

          HTTP_CODE=""
          for attempt in 1 2 3; do
            echo "📥 Attempt $attempt/3"
            HTTP_CODE=$(curl -sS -w "%{http_code}" -L \
              --connect-timeout 30 --max-time 1800 \
              "${HEADERS[@]}" -o "$OUTPUT" "$URL" 2>&1 | tail -1)
            echo "   HTTP status: $HTTP_CODE"
            if [[ "$HTTP_CODE" == "200" ]]; then
              break
            fi
            if [[ $attempt -lt 3 ]]; then
              sleep $((5 * attempt))
            fi
          done

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "❌ Download failed with HTTP $HTTP_CODE"
            rm -f "$OUTPUT"
            exit 1
          fi

          FILE_SIZE=$(stat -c%s "$OUTPUT")
          FILE_SIZE_MB=$((FILE_SIZE / 1048576))
          if [[ $FILE_SIZE -lt 1024 ]]; then
            echo "❌ File too small (${FILE_SIZE} bytes)"
            exit 1
          fi
          echo "✅ Downloaded ${FILE_SIZE_MB} MB"

          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "output_file=$OUTPUT" >> $GITHUB_OUTPUT

      # ---------- split ----------
      - name: ✂️ Split large files
        id: split
        run: |
          set -euo pipefail
          INPUT_FILE="${{ steps.download.outputs.output_file }}"
          FILENAME="${{ steps.download.outputs.filename }}"
          THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          HARD_LIMIT_MB="${{ env.HARD_LIMIT_MB }}"

          STAGING_DIR="./staging"
          mkdir -p "$STAGING_DIR"

          SIZE=$(stat -c%s "$INPUT_FILE")
          SIZE_MB=$((SIZE / 1048576))

          SPLIT_SIZE="$THRESHOLD_MB"
          if [[ "$THRESHOLD_MB" -eq 0 || "$THRESHOLD_MB" -gt "$HARD_LIMIT_MB" ]]; then
            if [[ $SIZE -gt $((HARD_LIMIT_MB * 1048576)) ]]; then
              SPLIT_SIZE="$HARD_LIMIT_MB"
              echo "🛡️ Force‑splitting at ${SPLIT_SIZE} MB"
            else
              echo "📁 File size ${SIZE_MB} MB – no split needed"
              cp "$INPUT_FILE" "$STAGING_DIR/$FILENAME"
              echo "split=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          if [[ $SPLIT_SIZE -gt 0 && $SIZE -gt $((SPLIT_SIZE * 1048576)) ]]; then
            echo "✂️ Splitting into ${SPLIT_SIZE} MB parts..."
            cd "$STAGING_DIR"
            cp "$OLDPWD/$INPUT_FILE" "./$FILENAME"
            zip -r -s "${SPLIT_SIZE}m" "archive.zip" "$FILENAME"
            rm -f "$FILENAME"
            cd "$OLDPWD"
            echo "split=true" >> $GITHUB_OUTPUT
            echo "base_name=archive.zip" >> $GITHUB_OUTPUT
          else
            cp "$INPUT_FILE" "$STAGING_DIR/$FILENAME"
            echo "📁 Under threshold – single file kept"
            echo "split=false" >> $GITHUB_OUTPUT
          fi

      # ---------- push ----------
      - name: 🚀 Push to orphan branch
        run: |
          set -euo pipefail
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          STAGING_DIR="./staging"
          ORPHAN_DIR=$(mktemp -d)

          cp -a "$STAGING_DIR"/* "$ORPHAN_DIR/"
          cd "$ORPHAN_DIR"

          git init --initial-branch=main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "$REPO_URL"

          git add .
          git commit -m "chore: download ${{ steps.download.outputs.filename }} [skip ci]" || {
            echo "⚠️ Nothing to commit"
            exit 1
          }

          PUSH_OK=false
          for attempt in 1 2 3 4; do
            if git push origin "HEAD:${BRANCH_NAME}" --force; then
              PUSH_OK=true
              break
            fi
            sleep $((2 ** (attempt-1)))
          done

          if ! $PUSH_OK; then
            echo "❌ Push failed"
            exit 1
          fi
          if ! git ls-remote origin "refs/heads/${BRANCH_NAME}" | grep -q "${BRANCH_NAME}"; then
            echo "❌ Branch not found after push"
            exit 1
          fi
          echo "✅ Branch '${BRANCH_NAME}' pushed"

      - name: 📋 Summary
        run: |
          REPO="${{ github.repository }}"
          BRANCH="${{ env.BRANCH_NAME }}"
          FILENAME="${{ steps.download.outputs.filename }}"
          SPLIT="${{ steps.split.outputs.split }}"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [[ "$SPLIT" == "true" ]]; then
            echo "📦 Split parts: https://github.com/${REPO}/tree/${BRANCH}"
          else
            echo "📄 Direct link: https://raw.githubusercontent.com/${REPO}/${BRANCH}/${FILENAME}"
          fi
          echo "📥 Download ZIP: https://github.com/${REPO}/archive/refs/heads/${BRANCH}.zip"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
