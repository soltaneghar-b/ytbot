name: 🔽 General Downloader (with Logs)

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🔗 Direct download URL (ignored if run_id is set)'
        required: false
        type: string
        default: ''
      run_id:
        description: '🆔 GitHub Actions Run ID (to download its logs)'
        required: false
        type: string
        default: ''
      repo:
        description: '📦 Repo where the run lives (owner/repo). Empty = current repo.'
        required: false
        type: string
        default: ''
      filename:
        description: '💾 Custom filename (optional)'
        required: false
        type: string
        default: ''
      split_threshold_mb:
        description: '📦 Split larger than (MB) — 0 = never split'
        required: false
        type: number
        default: 0

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write        # to push the branch
      actions: read          # to read logs / download URL
    env:
      BRANCH_NAME: download-${{ github.run_id }}
      HARD_LIMIT_MB: 90

    steps:
      - name: 💾 Disk space check
        run: |
          # Use df -k to get available space in 1K-blocks, then convert to MB
          AVAIL_KB=$(df -k /home/runner | tail -1 | awk '{print $4}')
          if [[ -z "$AVAIL_KB" ]]; then
            echo "⚠️  Could not determine free space; proceeding anyway"
            exit 0
          fi
          AVAIL_MB=$((AVAIL_KB / 1024))
          echo "📀 Free space: ${AVAIL_MB} MB"
          if [[ $AVAIL_MB -lt 2048 ]]; then
            echo "❌ Less than 2 GB free – aborting"
            exit 1
          fi
          echo "✅ Disk space OK"

      - name: 🔐 Generate GitHub App token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # no 'owner' or 'repositories' → token works for all installations

      - name: 🔄 Fetch fresh logs download URL
        id: get-log-url
        if: ${{ inputs.run_id != '' }}
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          REPO="${{ inputs.repo }}"
          [[ -z "$REPO" ]] && REPO="${{ github.repository }}"
          RUN_ID="${{ inputs.run_id }}"

          echo "🔍 Fetching logs for $REPO / run $RUN_ID"
          RESPONSE=$(curl -sS -I -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/logs")
          HTTP_CODE=$(echo "$RESPONSE" | head -1 | awk '{print $2}')
          echo "   HTTP status: $HTTP_CODE"

          if [[ "$HTTP_CODE" == "302" ]]; then
            URL=$(echo "$RESPONSE" | grep -i '^location:' | sed 's/^location: //i' | tr -d '\r')
            if [[ -n "$URL" ]]; then
              echo "✅ Fresh logs URL: ${URL:0:120}..."
              echo "download_url=$URL" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # If we're still here, something went wrong
          echo "❌ Failed to get download URL. Full response:"
          echo "$RESPONSE"
          echo "---"
          # Also try to get error body (if any)
          curl -sS -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/logs" || true
          exit 1

      - name: ⬇️ Download file
        id: download
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.run_id }}" ]]; then
            DOWNLOAD_URL="${{ steps.get-log-url.outputs.download_url }}"
          elif [[ -n "${{ inputs.url }}" ]]; then
            DOWNLOAD_URL="${{ inputs.url }}"
          else
            echo "❌ No download URL or run ID"
            exit 1
          fi

          CUSTOM_FILENAME="${{ inputs.filename }}"
          if [[ -n "$CUSTOM_FILENAME" ]]; then
            FILENAME="$CUSTOM_FILENAME"
          else
            FILENAME=$(basename "$DOWNLOAD_URL" | sed 's/?.*//')
            [[ -z "$FILENAME" || "$FILENAME" == "/" ]] && FILENAME="download"
          fi

          echo "📥 Downloading → $FILENAME"
          mkdir -p downloads
          OUTPUT="downloads/$FILENAME"

          # No extra auth header for pre‑signed URLs
          if [[ "$DOWNLOAD_URL" == *results-receiver* ]]; then
            AUTH_HEADER=()
          elif [[ "$DOWNLOAD_URL" == https://api.github.com/* ]] || [[ "$DOWNLOAD_URL" == https://raw.githubusercontent.com/* ]]; then
            AUTH_HEADER=(-H "Authorization: Bearer $GH_TOKEN")
          else
            AUTH_HEADER=()
          fi

          for attempt in 1 2 3; do
            echo "🔄 Attempt $attempt"
            HTTP_CODE=$(curl -sS -w "%{http_code}" -L --max-time 1800 \
              "${AUTH_HEADER[@]}" -o "$OUTPUT" "$DOWNLOAD_URL")
            echo "   HTTP $HTTP_CODE"
            [[ "$HTTP_CODE" == "200" ]] && break
            sleep $((5 * attempt))
          done

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "❌ Download failed with HTTP $HTTP_CODE"
            exit 1
          fi

          SIZE=$(stat -c%s "$OUTPUT")
          echo "✅ Downloaded $SIZE bytes"
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "output=$OUTPUT" >> $GITHUB_OUTPUT

      - name: ✂️ Split large files
        id: split
        run: |
          INPUT="${{ steps.download.outputs.output }}"
          FILENAME="${{ steps.download.outputs.filename }}"
          THRESHOLD="${{ inputs.split_threshold_mb }}"
          HARD_LIMIT="${{ env.HARD_LIMIT_MB }}"
          mkdir -p staging
          SIZE=$(stat -c%s "$INPUT")
          SIZE_MB=$((SIZE / 1048576))

          if [[ "$THRESHOLD" -eq 0 || "$THRESHOLD" -gt "$HARD_LIMIT" ]]; then
            if [[ $SIZE -gt $((HARD_LIMIT * 1048576)) ]]; then
              THRESHOLD="$HARD_LIMIT"
            else
              cp "$INPUT" "staging/$FILENAME"
              echo "split=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          if [[ $SIZE -gt $((THRESHOLD * 1048576)) ]]; then
            echo "✂️ Splitting at ${THRESHOLD} MB"
            cd staging
            cp "../$INPUT" "./$FILENAME"
            zip -r -s "${THRESHOLD}m" archive.zip "$FILENAME"
            rm -f "$FILENAME"
            cd ..
            echo "split=true" >> $GITHUB_OUTPUT
            echo "base=archive.zip" >> $GITHUB_OUTPUT
          else
            cp "$INPUT" "staging/$FILENAME"
            echo "📁 Under threshold – single file kept"
            echo "split=false" >> $GITHUB_OUTPUT
          fi

      - name: 🚀 Push branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # for git push
        run: |
          REPO_URL="https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.git"
          TMP=$(mktemp -d)
          cp -a staging/* "$TMP/"
          cd "$TMP"
          git init --initial-branch=main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "$REPO_URL"
          git add .
          git commit -m "download: ${{ steps.download.outputs.filename }}" || true
          for i in 1 2 3 4; do
            if git push origin "HEAD:${BRANCH_NAME}" --force; then
              echo "✅ Push succeeded"
              break
            fi
            sleep $((2 ** (i-1)))
          done
          git ls-remote origin "refs/heads/${BRANCH_NAME}" | grep -q . || { echo "❌ Branch not found"; exit 1; }

      - name: 📋 Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📄 File: ${{ steps.download.outputs.filename }}"
          echo "🌿 Branch: ${BRANCH_NAME}"
          if [[ "${{ steps.split.outputs.split }}" == "true" ]]; then
            echo "📦 Split parts: https://github.com/${{ github.repository }}/tree/${BRANCH_NAME}"
          else
            echo "⬇️ Direct download: https://raw.githubusercontent.com/${{ github.repository }}/${BRANCH_NAME}/${{ steps.download.outputs.filename }}"
          fi
          echo "📥 ZIP of everything: https://github.com/${{ github.repository }}/archive/refs/heads/${BRANCH_NAME}.zip"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
