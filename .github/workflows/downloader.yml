name: 🔽 General Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🔗 Download URL'
        required: true
        type: string
      filename:
        description: '💾 Custom filename (optional – auto‑detected if empty)'
        required: false
        type: string
        default: ''
      split_threshold_mb:
        description: '📦 Split larger than (MB) — 0 = never split'
        required: false
        type: number
        default: 0

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write          # needed to push the branch
    env:
      BRANCH_NAME: download-${{ github.run_id }}
      HARD_LIMIT_MB: 90

    steps:
      # ---------- disk space ----------
      - name: 💾 Disk space check
        run: |
          AVAIL_MB=$(df /home/runner --output=avail | tail -1 | awk '{print int($1/1024)}')
          echo "📀 Free: ${AVAIL_MB} MB"
          if [[ $AVAIL_MB -lt 2048 ]]; then
            echo "❌ <2 GB free – aborting"
            exit 1
          fi

      # ---------- GitHub App token (all repos) ----------
      - name: 🔐 Get GitHub App token (all repositories)
        id: token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}
          # no 'repository' given → token works for every repo where the app is installed

      # ---------- download ----------
      - name: ⬇️ Download file
        id: download
        env:
          TOKEN: ${{ steps.token.outputs.token }}
        run: |
          set -euo pipefail
          URL="${{ inputs.url }}"
          CUSTOM_FILENAME="${{ inputs.filename }}"

          # Determine filename
          if [[ -n "$CUSTOM_FILENAME" ]]; then
            FILENAME="$CUSTOM_FILENAME"
          else
            FILENAME=$(basename "$URL" | sed 's/?.*//')
            if [[ -z "$FILENAME" || "$FILENAME" == "/" ]]; then
              FILENAME="download"
            fi
          fi

          echo "📥 Downloading → $FILENAME"
          mkdir -p downloads
          OUTPUT="downloads/$FILENAME"

          # Retry up to 3 times
          for attempt in 1 2 3; do
            echo "🔄 Attempt $attempt"
            HTTP_CODE=$(curl -sS -w "%{http_code}" -L \
              --max-time 1800 \
              -H "Authorization: Bearer $TOKEN" \
              -o "$OUTPUT" "$URL")
            echo "   HTTP $HTTP_CODE"
            if [[ "$HTTP_CODE" == "200" ]]; then
              break
            fi
            sleep $((5 * attempt))
          done

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "❌ Download failed with HTTP $HTTP_CODE"
            exit 1
          fi

          SIZE=$(stat -c%s "$OUTPUT")
          echo "✅ Downloaded $SIZE bytes"
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "output=$OUTPUT" >> $GITHUB_OUTPUT

      # ---------- split if needed ----------
      - name: ✂️ Split large files
        id: split
        run: |
          INPUT="${{ steps.download.outputs.output }}"
          FILENAME="${{ steps.download.outputs.filename }}"
          THRESHOLD="${{ inputs.split_threshold_mb }}"
          HARD_LIMIT="$HARD_LIMIT_MB"

          mkdir -p staging
          SIZE=$(stat -c%s "$INPUT")
          SIZE_MB=$((SIZE / 1048576))

          # Force split if file exceeds the hard GitHub limit
          if [[ "$THRESHOLD" -eq 0 || "$THRESHOLD" -gt "$HARD_LIMIT" ]]; then
            if [[ $SIZE -gt $((HARD_LIMIT * 1048576)) ]]; then
              THRESHOLD="$HARD_LIMIT"
            else
              cp "$INPUT" "staging/$FILENAME"
              echo "split=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          if [[ $SIZE -gt $((THRESHOLD * 1048576)) ]]; then
            echo "✂️ Splitting at ${THRESHOLD} MB"
            cd staging
            cp "../$INPUT" "./$FILENAME"
            zip -r -s "${THRESHOLD}m" archive.zip "$FILENAME"
            rm -f "$FILENAME"
            cd ..
            echo "split=true" >> $GITHUB_OUTPUT
            echo "base=archive.zip" >> $GITHUB_OUTPUT
          else
            cp "$INPUT" "staging/$FILENAME"
            echo "split=false" >> $GITHUB_OUTPUT
          fi

      # ---------- push to orphan branch ----------
      - name: 🚀 Push branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_URL="https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.git"
          TMP=$(mktemp -d)
          cp -a staging/* "$TMP/"
          cd "$TMP"

          git init --initial-branch=main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "$REPO_URL"

          git add .
          git commit -m "download: ${{ steps.download.outputs.filename }}" || true

          for i in 1 2 3 4; do
            if git push origin "HEAD:${BRANCH_NAME}" --force; then
              echo "✅ Push succeeded"
              break
            fi
            sleep $((2 ** (i-1)))
          done

          if ! git ls-remote origin "refs/heads/${BRANCH_NAME}" | grep -q .; then
            echo "❌ Branch not found after push – something went wrong."
            exit 1
          fi

      # ---------- summary ----------
      - name: 📋 Summary
        run: |
          REPO="${{ github.repository }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📄 File: ${{ steps.download.outputs.filename }}"
          echo "🌿 Branch: ${BRANCH_NAME}"
          if [[ "${{ steps.split.outputs.split }}" == "true" ]]; then
            echo "📦 Split parts: https://github.com/${REPO}/tree/${BRANCH_NAME}"
          else
            echo "⬇️ Direct download: https://raw.githubusercontent.com/${REPO}/${BRANCH_NAME}/${{ steps.download.outputs.filename }}"
          fi
          echo "📥 ZIP of everything: https://github.com/${REPO}/archive/refs/heads/${BRANCH_NAME}.zip"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "ℹ️  The branch will be automatically deleted after 3 hours by the cleanup workflow (if you have one)."
