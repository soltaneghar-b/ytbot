# bot.yml
name: 🤖 YouTube Streamer Dispatcher

on:
  schedule:
    - cron: '*/30 * * * *'   # fallback every 30 minutes
  workflow_dispatch:
    inputs:
      offset:
        description: 'Update offset to start from'
        required: false
        type: string
        default: ''

concurrency:
  group: yt-streamer-bot
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours max
    steps:
      - name: 🔐 Generate GitHub App token (initial)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "ytbot,ytbot_rust,st1,st2,st3,st4,st5,st6,st7,st8,st9,st10,st11,st12,st13,st14,st15,st16,st17,st18,st19,st20,st21,st22,st23,st24,st25,st26,st27,st28,st29,st30,st31,st32,st33,st34,st35,st36,st37,st38,st39,st40,st41,st42,st43,st44,st45,st46,st47,st48,st49,st50"

      - name: 📥 Download bot binary from private repo
        run: |
          echo "📥 Downloading binary..."
          curl -fSL --retry 3 -o yt-streamer-bot \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            "https://raw.githubusercontent.com/${{ github.repository_owner }}/ytbot_rust/refs/heads/bot-binary/yt-streamer-bot"
          chmod +x yt-streamer-bot
          echo "✅ Download complete"

      - name: 🚀 Run bot
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          BOT_REPO: ${{ github.event.repository.name }}
          STREAMER_REPO_PREFIX: 'st'
          STREAMER_REPO_COUNT: '50'
          OFFSET: ${{ github.event.inputs.offset || '' }}
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}
        run: ./yt-streamer-bot
