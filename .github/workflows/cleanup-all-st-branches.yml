name: 🧹 Wipe all stream/download/zip branches in st repos

on:
  workflow_dispatch:

jobs:
  wipe-st-branches:
    name: 🗑️ Delete ALL matching branches (no age check)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: [st1, st2, st3, st4, st5, st6, st7, st8, st9, st10,
               st11, st12, st13, st14, st15, st16, st17, st18, st19, st20,
               st21, st22, st23, st24, st25, st26, st27, st28, st29, st30,
               st31, st32, st33, st34, st35, st36, st37, st38, st39, st40,
               st41, st42, st43, st44, st45, st46, st47, st48, st49, st50]
    steps:
      - name: 🔐 Generate installation token for st repos
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "st1,st2,st3,st4,st5,st6,st7,st8,st9,st10,st11,st12,st13,st14,st15,st16,st17,st18,st19,st20,st21,st22,st23,st24,st25,st26,st27,st28,st29,st30,st31,st32,st33,st34,st35,st36,st37,st38,st39,st40,st41,st42,st43,st44,st45,st46,st47,st48,st49,st50"

      - name: 🧹 Delete matching branches in ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ matrix.repo }}
        run: |
          set -euo pipefail
          echo "=== Cleaning $REPO ==="

          # Fetch all branches
          BRANCHES=$(gh api "repos/$OWNER/$REPO/branches?per_page=100" -q '.[].name' 2>/dev/null || true)
          if [ -z "$BRANCHES" ]; then
            echo "No branches found in $REPO."
            exit 0
          fi

          # Filter for stream-, download-, zip- prefixes
          FILTERED=$(echo "$BRANCHES" | grep -E '^(stream-|download-|zip-)' || true)
          if [ -z "$FILTERED" ]; then
            echo "No matching branches in $REPO."
            exit 0
          fi

          echo "Branches to delete:"
          echo "$FILTERED"
          echo ""

          for branch in $FILTERED; do
            echo "  🗑️ Deleting $branch ..."
            gh api "repos/$OWNER/$REPO/git/refs/heads/$branch" -X DELETE --silent || \
              echo "  ⚠️ Failed to delete $branch (may already be gone)"
          done

          echo "✅ $REPO cleaned."
