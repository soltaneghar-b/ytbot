name: Update WebView2 Runtime Installer

on:
  workflow_dispatch:   # manual trigger only

jobs:
  download-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download WebView2 Evergreen Bootstrapper
        run: |
          # Official Microsoft redirect link (without /p/ and with lowercase linkid)
          DOWNLOAD_URL="https://go.microsoft.com/fwlink/?linkid=2124784"
          OUTPUT_FILE="installers/MicrosoftEdgeWebview2Bootstrapper.exe"
          mkdir -p installers
          curl -L \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36" \
            -o "$OUTPUT_FILE" \
            "$DOWNLOAD_URL"

      - name: Verify downloaded file is a Windows executable
        run: |
          FILE="installers/MicrosoftEdgeWebview2Bootstrapper.exe"
          # Check that the file starts with "MZ" (DOS header)
          if ! head -c 2 "$FILE" | grep -q "MZ"; then
            echo "::error::Downloaded file is not a valid Windows executable (no MZ header)."
            echo "First 200 bytes:"
            head -c 200 "$FILE"
            exit 1
          fi
          echo "✅ Valid executable (MZ header found)"

      - name: Check for changes
        id: check
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add installers/MicrosoftEdgeWebview2Bootstrapper.exe
          git commit -m "chore: update WebView2 bootstrapper [skip ci]"
          git push
