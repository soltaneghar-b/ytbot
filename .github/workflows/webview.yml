name: Update WebView2 Runtime Installer

on:
  schedule:
    # Check once a week for new versions (adjust as needed)
    - cron: '0 0 * * 0'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  download-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push to the repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download WebView2 Evergreen Bootstrapper
        run: |
          # Official Microsoft redirect link for the latest bootstrapper
          DOWNLOAD_URL="https://go.microsoft.com/fwlink/p/?LinkId=2124784"
          OUTPUT_FILE="installers/MicrosoftEdgeWebview2Bootstrapper.exe"
          mkdir -p installers
          curl -L -o "$OUTPUT_FILE" "$DOWNLOAD_URL"
          echo "Downloaded to $OUTPUT_FILE"

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add installers/MicrosoftEdgeWebview2Bootstrapper.exe
          git commit -m "chore: update WebView2 bootstrapper [skip ci]"
          git push
