# .github/workflows/discover-hub-api.yml
name: 🔎 Discover hub.ytconvert.org search endpoint

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Probe common API patterns
        env:
          BASE: ${{ secrets.HUB_YT_API_URL }}   # e.g. https://hub.ytconvert.org
          API_KEY: ${{ secrets.HUB_YT_API_KEY }}
          QUERY: "موسیقی"
        run: |
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${QUERY}'))")

          # List of paths to try (no secrets printed)
          PATHS=(
            "/api/search"
            "/api/v1/search"
            "/api/v2/search"
            "/search"
            "/api/playlists"
            "/api/v1/playlists"
            "/api/query"
          )

          # Common parameter patterns
          PARAMS=(
            "q=${ENCODED}"
            "query=${ENCODED}"
            "search=${ENCODED}"
            "q=${ENCODED}&type=playlist"
            "query=${ENCODED}&type=playlist"
          )

          echo "Testing GET requests..."
          for path in "${PATHS[@]}"; do
            for param in "${PARAMS[@]}"; do
              url="${BASE}${path}?${param}"
              code=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${API_KEY}" "$url" 2>/dev/null)
              if [ "$code" = "200" ]; then
                echo "✅ GET ${path}?<params> → 200"
              elif [ "$code" != "000" ] && [ "$code" != "404" ]; then
                echo "🔸 GET ${path}?<params> → ${code}"
              fi
            done
          done

          echo ""
          echo "Testing POST requests (JSON body)..."
          for path in "${PATHS[@]}"; do
            for param in "${PARAMS[@]}"; do
              # parse param into key=val
              key=$(echo "$param" | cut -d= -f1)
              val=$(echo "$param" | cut -d= -f2)
              json_body="{\"${key}\":\"${val}\"}"
              code=$(curl -s -o /dev/null -w "%{http_code}" -X POST -H "Authorization: Bearer ${API_KEY}" -H "Content-Type: application/json" -d "$json_body" "$url" 2>/dev/null)
              if [ "$code" = "200" ]; then
                echo "✅ POST ${path} (JSON) → 200"
              elif [ "$code" != "000" ] && [ "$code" != "404" ]; then
                echo "🔸 POST ${path} (JSON) → ${code}"
              fi
            done
          done

          echo ""
          echo "Discovery complete. Focus on endpoints that returned 200."
          sleep 30
