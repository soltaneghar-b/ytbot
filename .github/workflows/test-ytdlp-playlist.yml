# .github/workflows/test-warp-playlist.yml
name: 🧪 Test WARP proxy for playlist search

on:
  workflow_dispatch:

jobs:
  test-warp:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Start WARP container
        run: |
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          echo "Waiting for WARP..."
          sleep 15
          for i in {1..5}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "✅ WARP active"
              echo "$RESULT"
              exit 0
            fi
            sleep 5
          done
          echo "⚠️ WARP may not be fully active, continuing anyway"

      - name: Install yt-dlp
        run: pip install yt-dlp==2026.3.17

      - name: Test playlist search through WARP
        env:
          QUERY: "موسیقی"
        run: |
          echo "=========================================="
          echo "Testing playlist search via WARP proxy"
          echo "Query: ${QUERY}"
          echo "=========================================="
          yt-dlp \
            --proxy "socks5://127.0.0.1:1080" \
            "ytsearch10:playlist:${QUERY}" \
            --flat-playlist \
            --dump-json \
            --no-warnings \
            --skip-download \
            > out.json 2>err.log

          echo "Exit code: $?"
          echo ""
          echo "--- stderr ---"
          cat err.log
          echo ""
          echo "--- stdout (first 20 lines) ---"
          head -20 out.json
          echo ""

          if grep -q '"playlist_id"' out.json; then
            echo "✅ SUCCESS: Playlist results found through WARP!"
          else
            echo "❌ No playlist_id detected"
          fi
          echo ""
          echo "Sleeping 30 seconds so you can read the logs…"
          sleep 30
