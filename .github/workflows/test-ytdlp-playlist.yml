# .github/workflows/discover-hub-api.yml
name: 🔎 Discover hub.ytconvert.org search endpoint

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Probe common API patterns
        env:
          BASE: ${{ secrets.HUB_YT_API_URL }}       # e.g. https://hub.ytconvert.org
          API_KEY: ${{ secrets.HUB_YT_API_KEY }}
          QUERY: "موسیقی"
        run: |
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${QUERY}'))")

          # Common path patterns (base URL is appended automatically)
          PATHS=(
            "/api/search"
            "/api/v1/search"
            "/api/v2/search"
            "/search"
            "/api/playlists"
            "/api/v1/playlists"
            "/api/query"
            "/api/v1/query"
          )

          # Query‑parameter sets to combine with paths
          PARAMS=(
            "q=${ENCODED}"
            "query=${ENCODED}"
            "search=${ENCODED}"
            "q=${ENCODED}&type=playlist"
            "query=${ENCODED}&type=playlist"
          )

          echo "=== GET requests ==="
          for path in "${PATHS[@]}"; do
            for param in "${PARAMS[@]}"; do
              url="${BASE}${path}?${param}"
              code=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${API_KEY}" "$url" 2>/dev/null)
              case "$code" in
                200) echo "✅ GET ${path}?<params> → 200" ;;
                000|404) ;;   # skip 404 and connection errors
                *)    echo "🔸 GET ${path}?<params> → ${code}" ;;
              esac
            done
          done

          echo ""
          echo "=== POST requests (JSON body) ==="
          for path in "${PATHS[@]}"; do
            for param in "${PARAMS[@]}"; do
              key=$(echo "$param" | cut -d= -f1)
              val=$(echo "$param" | cut -d= -f2)
              json_body="{\"${key}\":\"${val}\"}"
              code=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST \
                -H "Authorization: Bearer ${API_KEY}" \
                -H "Content-Type: application/json" \
                -d "$json_body" \
                "$url" 2>/dev/null)
              case "$code" in
                200) echo "✅ POST ${path} (JSON) → 200" ;;
                000|404) ;;
                *)    echo "🔸 POST ${path} (JSON) → ${code}" ;;
              esac
            done
          done

          echo ""
          echo "=== POST requests (form data) ==="
          for path in "${PATHS[@]}"; do
            for param in "${PARAMS[@]}"; do
              key=$(echo "$param" | cut -d= -f1)
              val=$(echo "$param" | cut -d= -f2)
              code=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST \
                -H "Authorization: Bearer ${API_KEY}" \
                --data-urlencode "${key}=${val}" \
                "$url" 2>/dev/null)
              case "$code" in
                200) echo "✅ POST ${path} (form) → 200" ;;
                000|404) ;;
                *)    echo "🔸 POST ${path} (form) → ${code}" ;;
              esac
            done
          done

          echo ""
          echo "Discovery finished. Look for any line with ✅ (200)."
