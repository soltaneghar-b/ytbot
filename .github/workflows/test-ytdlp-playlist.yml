name: 🔍 Find stable yt‑dlp for playlists (newest → oldest)

on:
  workflow_dispatch:

jobs:
  find-version:
    runs-on: ubuntu-latest
    outputs:
      working-version: ${{ steps.test.outputs.version }}
    steps:
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🔁 Test yt‑dlp versions (newest first)
        id: test
        env:
          # newest → oldest; adjust as needed
          VERSIONS: |
            2026.03.17
            2026.01.15
            2025.11.07
            2025.09.01
            2025.06.15
            2025.03.22
            2024.12.06
          QUERY: "music"
        run: |
          set -e
          for ver in $VERSIONS; do
            echo "----------------------------------------"
            echo "Testing yt‑dlp==$ver ..."
            pip install -q yt-dlp==$ver
            # playlist search with a short query
            if yt-dlp "ytsearch5:playlist:${QUERY}" --flat-playlist --dump-json --no-warnings --skip-download > out.json 2>err.log; then
              if grep -q '"playlist_id"' out.json; then
                echo "✅ SUCCESS: yt-dlp==$ver works for playlists"
                echo "version=$ver" >> $GITHUB_OUTPUT
                exit 0
              else
                echo "⚠️  No playlist results returned by $ver"
              fi
            else
              echo "❌ yt‑dlp==$ver failed (exit code $?). Error log:"
              cat err.log
            fi
          done
          echo "No working version found."
          exit 1
