# .github/workflows/test-hub.yml
name: 🧪 Test hub.ytconvert.org (private)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Call private API
        env:
          API_URL: ${{ secrets.HUB_YT_API_URL }}
          API_KEY: ${{ secrets.HUB_YT_API_KEY }}
          QUERY: "موسیقی"
        run: |
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${QUERY}'))")
          echo "=========================================="
          echo "Test: hub.ytconvert.org playlist search"
          echo "Query: ${QUERY} (encoded: ${ENCODED})"
          echo "API URL: [hidden]"
          echo "API Key present: $([ -n "${API_KEY}" ] && echo 'YES' || echo 'NO')"
          echo "=========================================="

          if [ -n "${API_KEY}" ]; then
            RESPONSE=$(curl -s -H "Authorization: Bearer ${API_KEY}" "${API_URL}?q=${ENCODED}&type=playlist")
            CURL_EXIT=$?
          else
            RESPONSE=$(curl -s "${API_URL}?q=${ENCODED}&type=playlist")
            CURL_EXIT=$?
          fi

          echo ""
          echo "--- curl exit code: ${CURL_EXIT} ---"
          echo ""
          echo "Response (full):"
          echo "${RESPONSE}"
          echo ""
          echo "--- end of response ---"
          echo ""

          if echo "${RESPONSE}" | grep -q '"playlist_id"'; then
            echo "✅ SUCCESS: playlists found"
          else
            echo "❌ No playlist_id detected"
          fi

          echo ""
          echo "Sleeping 30 seconds so you can read the logs…"
          sleep 30
