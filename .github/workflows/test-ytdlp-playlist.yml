# .github/workflows/test-hub.yml
name: 🧪 Test hub.ytconvert.org (private)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Call private API
        env:
          API_URL: ${{ secrets.HUB_YT_API_URL }}
          API_KEY: ${{ secrets.HUB_YT_API_KEY }}
          QUERY: "موسیقی"
        run: |
          # URL-encode the Persian query
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${QUERY}'))")
          echo "Searching for: ${QUERY}"
          echo "(API endpoint and key are hidden)"

          # Build request (add &type=playlist or similar if supported)
          # Example: use GET with query param, and Authorization header if key provided
          if [ -n "${API_KEY}" ]; then
            RESPONSE=$(curl -s -H "Authorization: Bearer ${API_KEY}" "${API_URL}?q=${ENCODED}&type=playlist")
          else
            RESPONSE=$(curl -s "${API_URL}?q=${ENCODED}&type=playlist")
          fi

          echo "Response preview (first 100 chars):"
          echo "${RESPONSE}" | head -c 100
          echo ""

          # Check for playlist IDs
          if echo "${RESPONSE}" | grep -q '"playlist_id"'; then
            echo "✅ Playlist results found!"
          else
            echo "❌ No playlist_id in response."
          fi
