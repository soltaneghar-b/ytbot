name: 🎬 YouTube HLS Streamer v5

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🎬 YouTube Video URL'
        required: true
        type: string
      type:
        description: '📦 Output Type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'
      quality:
        description: '🎚️ Quality (video: 144p/360p/480p/720p/1080p | audio: 64kbps/128kbps/192kbps/320kbps)'
        required: false
        type: string
        default: '720p'

jobs:
  stream:
    name: 🎬 HLS Stream & Download
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    env:
      BRANCH_NAME_STREAM: stream-${{ github.run_id }}
      BRANCH_NAME_DOWNLOAD: download-${{ github.run_id }}
      BRANCH_NAME_ZIP: zip-${{ github.run_id }}
      CONFIG_BASE: https://raw.githubusercontent.com/${{ github.repository_owner }}/yt-streamer-config/refs/heads/main
    steps:
      # ---------- setup ----------
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 1

      - name: 📥 Fetch shared scripts & templates
        run: |
          echo "📥 Downloading shared files from yt-streamer-config..."
          curl -sSL -o converter.py            "$CONFIG_BASE/converter.py"
          curl -sSL -o sanitize.py             "$CONFIG_BASE/sanitize.py"
          curl -sSL -o segment.sh              "$CONFIG_BASE/segment.sh"
          curl -sSL -o player-template.html    "$CONFIG_BASE/player-template.html"
          curl -sSL -o audio-player-template.html "$CONFIG_BASE/audio-player-template.html"
          curl -sSL -o download.html           "$CONFIG_BASE/download.html"
          chmod +x segment.sh
          echo "✅ All files fetched"

      - name: 📦 Cache static ffmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ~/ffmpeg
          key: ffmpeg-${{ runner.os }}-n8.1-v3

      - name: 🔧 Download & extract ffmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          URL="https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-linux64-gpl-8.1.tar.xz"
          echo "📥 Downloading static ffmpeg from $URL"
          rm -rf ~/ffmpeg
          mkdir -p ~/ffmpeg
          curl -sSL --fail "$URL" -o /tmp/ffmpeg.tar.xz
          tar xf /tmp/ffmpeg.tar.xz -C ~/ffmpeg
          rm /tmp/ffmpeg.tar.xz
          FFMPEG_BIN=$(find ~/ffmpeg -type f -name ffmpeg -executable 2>/dev/null | head -1)
          if [ -z "$FFMPEG_BIN" ]; then
            echo "❌ ffmpeg binary not found after extraction"
            exit 1
          fi
          if [ "$(dirname "$FFMPEG_BIN")" != "$HOME/ffmpeg" ]; then
            mv "$(dirname "$FFMPEG_BIN")"/* "$HOME/ffmpeg/"
            rmdir "$(dirname "$FFMPEG_BIN")" 2>/dev/null || true
          fi
          if [ ! -f ~/ffmpeg/ffmpeg ]; then
            echo "❌ ffmpeg binary not found after rearrangement"
            exit 1
          fi
          echo "✅ ffmpeg extracted."

      - name: 🛠 Add ffmpeg to PATH
        run: |
          if [ -f ~/ffmpeg/ffmpeg ]; then
            echo "$HOME/ffmpeg" >> $GITHUB_PATH
            echo "✅ Using static ffmpeg"
          else
            echo "⚠️ Static ffmpeg missing – installing via apt"
            sudo apt-get update && sudo apt-get install -y ffmpeg
          fi

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      # ---------- convert & gather metadata ----------
      - name: 🎯 Request Conversion & Gather Metadata (retry up to 3 times)
        id: converter
        run: python3 converter.py
        env:
          YT_URL: ${{ github.event.inputs.url }}
          OUTPUT_TYPE: ${{ github.event.inputs.type }}
          QUALITY: ${{ github.event.inputs.quality }}
          API_ENDPOINT: ${{ secrets.YT_CONVERT_API }}
          REFERER_URL: ${{ secrets.YT_CONVERT_REFERER }}
          USER_AGENT: ${{ secrets.YT_CONVERT_USER_AGENT }}

      # ---------- sanitize filename ----------
      - name: 🧼 Sanitize filename
        run: |
          FILENAME=$(sed -n '2p' /tmp/metadata.txt)
          SANITIZED=$(python3 sanitize.py "$FILENAME")
          echo "🧼 Sanitized: $FILENAME → $SANITIZED"
          sed -i "2s/.*/$SANITIZED/" /tmp/metadata.txt

      # ---------- download & validate original ----------
      - name: 💾 Disk Space Check
        run: |
          AVAIL_KB=$(df /home/runner | awk 'NR==2 {print $4}')
          AVAIL_MB=$((AVAIL_KB / 1024))
          echo "📀 Available space: ${AVAIL_MB} MB"
          if [[ $AVAIL_MB -lt 5120 ]]; then
            echo "❌ Less than 5 GB free, aborting to avoid disk exhaustion"
            exit 1
          fi

      - name: ⬇️ Download Media File (robust, verbose)
        run: |
          exec 2>&1
          set -euo pipefail

          DOWNLOAD_URL=$(sed -n '1p' /tmp/metadata.txt)
          FILENAME=$(sed -n '2p' /tmp/metadata.txt)
          OUTPUT_TYPE=$(sed -n '3p' /tmp/metadata.txt)
          STATUS_URL=$(sed -n '5p' /tmp/metadata.txt)

          USER_AGENT="${USER_AGENT:-Mozilla/5.0}"
          REFERER_URL="${REFERER_URL:-}"

          TEMP_DIR="./downloads/temp"
          mkdir -p "$TEMP_DIR"
          OUTPUT_FILE="$TEMP_DIR/$FILENAME"

          echo "⬇️ Downloading $OUTPUT_TYPE ..."
          echo "📄 File: $FILENAME"
          echo "🔗 URL (first 120 chars): ${DOWNLOAD_URL:0:120}..."

          download_attempt() {
            local url="$1" output="$2"
            echo "   → Attempting download..." >&2
            HTTP_CODE=$(curl -sS -w "%{http_code}" -L \
              --connect-timeout 30 --max-time 1800 \
              --speed-limit 1024 --speed-time 60 \
              -H "User-Agent: ${USER_AGENT}" \
              -H "Referer: ${REFERER_URL}" \
              -o "$output" "$url" 2>&1 | tail -1)
            echo "$HTTP_CODE"
          }

          HTTP_CODE=""
          for attempt in 1 2 3; do
            echo "📥 Download attempt $attempt/3"
            HTTP_CODE=$(download_attempt "$DOWNLOAD_URL" "$OUTPUT_FILE")
            echo "   HTTP status: $HTTP_CODE"

            if [[ "$HTTP_CODE" == "200" ]]; then
              break
            fi

            if [[ -f "$OUTPUT_FILE" ]]; then
              echo "   Response body (first 500 chars):"
              head -c 500 "$OUTPUT_FILE" || true
              echo ""
            fi

            if [[ $attempt -lt 3 ]]; then
              echo "   ⚠️ Non‑200, waiting before retry..."
              sleep $((5 * attempt))
            fi
          done

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "🔄 Attempting token refresh via status URL..."
            FRESH_URL=$(curl -sS -L \
              -H "User-Agent: ${USER_AGENT}" \
              -H "Accept: application/json" \
              -H "Referer: ${REFERER_URL}" \
              "$STATUS_URL" | jq -r '.downloadUrl // empty' 2>/dev/null || true)
            if [[ -n "$FRESH_URL" && "$FRESH_URL" != "null" ]]; then
              echo "🔗 Fresh URL obtained, retrying download..."
              HTTP_CODE=$(download_attempt "$FRESH_URL" "$OUTPUT_FILE")
              echo "   HTTP status: $HTTP_CODE"
            else
              echo "⚠️ Could not obtain fresh download URL"
            fi
          fi

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "❌ Download failed with HTTP $HTTP_CODE"
            exit 1
          fi

          FILE_SIZE=$(stat -c%s "$OUTPUT_FILE")
          FILE_SIZE_MB=$((FILE_SIZE / 1048576))
          if [[ $FILE_SIZE -lt 10240 ]]; then
            echo "❌ File too small (${FILE_SIZE_MB} MB)"
            exit 1
          fi
          echo "📏 Size: ${FILE_SIZE_MB} MB"

          echo "🔍 Verifying media integrity..."
          ffprobe -v error -show_entries stream=codec_type,duration \
            -of default=noprint_wrappers=1 "$OUTPUT_FILE" > /tmp/ffprobe.txt 2>&1 || true
          if ! grep -q "codec_type" /tmp/ffprobe.txt; then
            echo "❌ No valid streams"
            cat /tmp/ffprobe.txt
            exit 1
          fi
          DURATION=$(grep -oP 'duration=\K[0-9.]+' /tmp/ffprobe.txt | head -1)
          if [[ -n "$DURATION" ]] && (( $(echo "$DURATION < 0.5" | bc -l) )); then
            echo "❌ Media too short (<0.5s)"
            exit 1
          fi
          echo "✅ Media integrity OK (duration: ${DURATION:-unknown}s)"
        env:
          REFERER_URL: ${{ secrets.YT_CONVERT_REFERER }}
          USER_AGENT: ${{ secrets.YT_CONVERT_USER_AGENT }}

      # ---------- subtitle preprocessing ----------
      - name: 📝 Subtitle Preprocessing
        id: subtitles
        if: ${{ github.event.inputs.type == 'video' }}
        run: |
          set -euo pipefail
          SUBTITLE_LINE=$(sed -n '6p' /tmp/metadata.txt 2>/dev/null || echo "NONE")
          echo "subtitle_ready=false" >> $GITHUB_OUTPUT

          if [[ "$SUBTITLE_LINE" != "NONE" && -n "$SUBTITLE_LINE" ]]; then
            echo "📝 Subtitle URL found, attempting download..."
            if curl -sS -L -o /tmp/subtitle_raw "$SUBTITLE_LINE" 2>/dev/null; then
              if ffmpeg -y -loglevel error -i /tmp/subtitle_raw -f webvtt /tmp/subtitles.vtt 2>/dev/null; then
                if [ -s /tmp/subtitles.vtt ] && grep -q 'WEBVTT' /tmp/subtitles.vtt; then
                  echo "✅ Subtitles ready"
                  echo "subtitle_ready=true" >> $GITHUB_OUTPUT
                else
                  echo "⚠️ Converted VTT empty or invalid – proceeding without subtitles"
                fi
              else
                echo "⚠️ Subtitle conversion failed – proceeding without subtitles"
              fi
            else
              echo "⚠️ Subtitle download failed – proceeding without subtitles"
            fi
          else
            echo "📝 No subtitles available"
          fi

      # ---------- dynamic segment calculation ----------
      - name: 🎚️ Calculate Dynamic Segment Duration
        if: ${{ github.event.inputs.type == 'video' }}
        id: dynamic_hls
        run: |
          set -euo pipefail
          FILENAME=$(sed -n '2p' /tmp/metadata.txt)
          INPUT_FILE="./downloads/temp/$FILENAME"
          FILE_SIZE=$(stat -c%s "$INPUT_FILE")

          HLS_TIME=6

          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$INPUT_FILE" 2>/dev/null || true)
          if [[ -n "$DURATION" && "$DURATION" != "0" ]]; then
            BITRATE=$(echo "scale=0; ($FILE_SIZE * 8) / $DURATION" | bc 2>/dev/null || true)
            if [[ -n "$BITRATE" && "$BITRATE" != "0" ]]; then
              TARGET_SEGMENT=$(echo "scale=2; (3 * 1024 * 1024 * 8) / $BITRATE" | bc 2>/dev/null || true)
              if [[ -n "$TARGET_SEGMENT" ]]; then
                if (( $(echo "$TARGET_SEGMENT < 2" | bc -l) )); then HLS_TIME=2;
                elif (( $(echo "$TARGET_SEGMENT > 10" | bc -l) )); then HLS_TIME=10;
                else HLS_TIME=$(printf "%.0f" "$TARGET_SEGMENT");
                fi
              fi
            fi
          fi

          if [[ -z "$HLS_TIME" || "$HLS_TIME" -eq 0 ]]; then
            HEIGHT=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of csv=p=0 "$INPUT_FILE" 2>/dev/null || true)
            if [[ -n "$HEIGHT" ]]; then
              if [[ "$HEIGHT" -ge 1080 ]]; then HLS_TIME=6
              elif [[ "$HEIGHT" -ge 720 ]]; then HLS_TIME=10
              elif [[ "$HEIGHT" -ge 480 ]]; then HLS_TIME=10
              else HLS_TIME=10
              fi
            else
              HLS_TIME=6
            fi
          fi

          echo "🔄 Final segment duration: ${HLS_TIME}s"
          echo "hls_time=${HLS_TIME}" >> $GITHUB_OUTPUT

      # ---------- HLS processing ----------
      - name: 🎬 Process Video to HLS
        if: ${{ github.event.inputs.type == 'video' }}
        id: process_video
        run: |
          set -euo pipefail
          FILENAME=$(sed -n '2p' /tmp/metadata.txt)
          INPUT_FILE="./downloads/temp/$FILENAME"
          SEGMENT_DIR="/tmp/hls"
          mkdir -p "$SEGMENT_DIR"
          HLS_TIME=${{ steps.dynamic_hls.outputs.hls_time }}
          SUBTITLE_READY="${{ steps.subtitles.outputs.subtitle_ready }}"

          AUDIO_STREAM=$(ffprobe -v error -select_streams a:0 -show_entries stream=codec_type -of default=noprint_wrappers=1:nokey=1 "$INPUT_FILE" 2>/dev/null || true)
          if [ -n "$AUDIO_STREAM" ]; then
            HAS_AUDIO=true
          else
            HAS_AUDIO=false
          fi

          FFMPEG_INPUTS=(-i "$INPUT_FILE")
          FFMPEG_MAPS=(-map 0:v:0)
          VAR_STREAM="v:0"

          if $HAS_AUDIO; then
            FFMPEG_MAPS+=(-map 0:a:0)
            VAR_STREAM="${VAR_STREAM},a:0"
          fi

          if [[ "$SUBTITLE_READY" == "true" ]]; then
            FFMPEG_INPUTS+=(-i /tmp/subtitles.vtt)
            FFMPEG_MAPS+=(-map 1:s:0)
            VAR_STREAM="${VAR_STREAM},s:0"
            SUBTITLE_FLAG=true
          else
            SUBTITLE_FLAG=false
          fi

          echo "📊 Audio present: $HAS_AUDIO   Subtitles: $SUBTITLE_FLAG"
          echo "   var_stream_map: $VAR_STREAM"

          if $SUBTITLE_FLAG; then
            ffmpeg -y "${FFMPEG_INPUTS[@]}" \
              "${FFMPEG_MAPS[@]}" \
              -c copy \
              -c:s webvtt \
              -f hls -hls_time "${HLS_TIME}" -hls_list_size 0 \
              -hls_segment_type fmp4 \
              -hls_fmp4_init_filename init.mp4 \
              -hls_flags independent_segments+temp_file \
              -hls_segment_filename "$SEGMENT_DIR/segment_%03d.m4s" \
              -var_stream_map "$VAR_STREAM" \
              -master_pl_name master.m3u8 \
              -loglevel error -stats \
              "$SEGMENT_DIR/playlist.m3u8" || { echo "❌ FFmpeg segmentation failed"; exit 1; }
          else
            ffmpeg -y "${FFMPEG_INPUTS[@]}" \
              "${FFMPEG_MAPS[@]}" \
              -c copy \
              -f hls -hls_time "${HLS_TIME}" -hls_list_size 0 \
              -hls_segment_type fmp4 \
              -hls_fmp4_init_filename init.mp4 \
              -hls_flags independent_segments+temp_file \
              -hls_segment_filename "$SEGMENT_DIR/segment_%03d.m4s" \
              -loglevel error -stats \
              "$SEGMENT_DIR/playlist.m3u8" || { echo "❌ FFmpeg segmentation failed"; exit 1; }
          fi

          echo "has_subtitles=${SUBTITLE_FLAG}" >> $GITHUB_OUTPUT

      - name: 🎵 Process Audio (copy)
        if: ${{ github.event.inputs.type == 'audio' }}
        run: |
          FILENAME=$(sed -n '2p' /tmp/metadata.txt)
          mkdir -p /tmp/audio
          cp "./downloads/temp/$FILENAME" /tmp/audio/audio.mp3

      - name: ✂️ Split video into 20 MB playable segments (for Bale delivery)
        if: ${{ github.event.inputs.type == 'video' }}
        id: video_segments
        run: |
          set -euo pipefail
          FILENAME=$(sed -n '2p' /tmp/metadata.txt)
          INPUT_FILE="./downloads/temp/$FILENAME"
          SEGMENT_DIR="./segment-staging"
          mkdir -p "$SEGMENT_DIR"

          SIZE_BYTES=$(stat -c%s "$INPUT_FILE")
          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$INPUT_FILE")
          BITRATE_BPS=$(echo "scale=0; ($SIZE_BYTES * 8) / $DURATION" | bc)
          SEG_TIME_SEC=$(echo "scale=2; 159383552 / $BITRATE_BPS" | bc)
          if (( $(echo "$SEG_TIME_SEC > 600" | bc -l) )); then SEG_TIME_SEC=600; fi
          SEG_TIME_INT=$(printf "%.0f" "$SEG_TIME_SEC")
          if [ "$SEG_TIME_INT" -lt 2 ]; then SEG_TIME_INT=2; fi

          echo "✂️ Splitting into ${SEG_TIME_INT}s segments (~19 MB each)"
          ffmpeg -y -i "$INPUT_FILE" -c copy -f segment -segment_time "$SEG_TIME_INT" -reset_timestamps 1 "$SEGMENT_DIR/seg_%03d.mp4"
          echo "✅ Segments created: $(ls -1 "$SEGMENT_DIR")"

          # Build JSON array of segment URLs safely
          REPO="${{ github.repository }}"
          BASE_URL="https://raw.githubusercontent.com/${REPO}/refs/heads/${BRANCH_NAME_STREAM}"
          SEGMENTS_JSON=$(find "$SEGMENT_DIR" -name 'seg_*.mp4' | sort | jq -R -s -c --arg base "$BASE_URL" 'split("\n") | map(select(length > 0) | "\($base)/\(.)")')
          echo "segments_json=${SEGMENTS_JSON}" >> $GITHUB_OUTPUT

      # ---------- rewrite URLs ----------
      - name: 🔗 Rewrite Playlist URLs (video)
        if: ${{ github.event.inputs.type == 'video' }}
        run: |
          SEGMENT_DIR="/tmp/hls"
          REPO="${{ github.repository }}"
          BASE_URL="https://raw.githubusercontent.com/${REPO}/refs/heads/${BRANCH_NAME_STREAM}"

          if [ -f "$SEGMENT_DIR/master.m3u8" ]; then
            sed -i "s|playlist.m3u8|${BASE_URL}/playlist.m3u8|g" "$SEGMENT_DIR/master.m3u8"
            sed -i "s|subtitle_eng.m3u8|${BASE_URL}/subtitle_eng.m3u8|g" "$SEGMENT_DIR/master.m3u8" 2>/dev/null || true
          fi
          for pl in "$SEGMENT_DIR"/*.m3u8; do
            sed -i "s|URI=\"init.mp4\"|URI=\"${BASE_URL}/init.mp4\"|g" "$pl"
            sed -i "s|segment_|${BASE_URL}/segment_|g" "$pl"
          done
          echo "✅ Playlist rewritten"

      # ---------- prepare download delivery ----------
      - name: 📦 Prepare Download Delivery
        id: download
        run: |
          set -euo pipefail
          FILENAME=$(sed -n '2p' /tmp/metadata.txt)
          INPUT_FILE="./downloads/temp/$FILENAME"
          OUTPUT_TYPE=$(sed -n '3p' /tmp/metadata.txt)
          REPO="${{ github.repository }}"
          DOWNLOAD_DIR="./download-staging"
          ZIP_DIR="./zip-staging"
          mkdir -p "$DOWNLOAD_DIR" "$ZIP_DIR"

          SIZE=$(stat -c%s "$INPUT_FILE")
          SIZE_MB=$((SIZE / 1048576))
          ZIP_URL=""

          if [[ "$SIZE_MB" -le 90 ]]; then
            echo "📁 File ≤ 90 MB – pushing raw file directly"
            cp "$INPUT_FILE" "$DOWNLOAD_DIR/$FILENAME"
            DOWNLOAD_URL="https://raw.githubusercontent.com/${REPO}/refs/heads/${BRANCH_NAME_DOWNLOAD}/${FILENAME}"
          else
            echo "📁 File > 90 MB – segmenting into playable parts"
            INPUT_FILE="$INPUT_FILE" DOWNLOAD_DIR="$DOWNLOAD_DIR" bash segment.sh
            PARTS=$(ls -1 "$DOWNLOAD_DIR"/part_*.mp4 | sort)

            # Build JSON array for download.html
            JSON_PARTS="["
            FIRST=true
            TOTAL_SIZE=0
            for f in $PARTS; do
              BASENAME=$(basename "$f")
              SIZE_B=$(stat -c%s "$f")
              TOTAL_SIZE=$((TOTAL_SIZE + SIZE_B))
              URL="https://raw.githubusercontent.com/${REPO}/refs/heads/${BRANCH_NAME_DOWNLOAD}/${BASENAME}"
              if [ "$FIRST" = true ]; then FIRST=false; else JSON_PARTS+=","; fi
              JSON_PARTS+="{\"name\":\"${BASENAME}\",\"url\":\"${URL}\",\"size\":${SIZE_B}}"
            done
            JSON_PARTS+="]"

            # Replace placeholders in download.html
            sed -e "s|__PARTS__|${JSON_PARTS}|g" \
                -e "s|__FILENAME__|${FILENAME}|g" \
                -e "s|__TOTAL_SIZE__|${TOTAL_SIZE}|g" \
                -e "s|__SHA256__||g" \
                download.html > "$DOWNLOAD_DIR/download.html"

            DOWNLOAD_URL="https://raw.githubusercontent.com/${REPO}/refs/heads/${BRANCH_NAME_DOWNLOAD}/download.html"

            # Also create the old multi-volume ZIP in a separate directory
            echo "📦 Creating multi-volume ZIP archive..."
            cp "$INPUT_FILE" "$ZIP_DIR/$FILENAME"
            cd "$ZIP_DIR"
            zip -r -s 90m video.zip "$FILENAME"
            rm -f "$FILENAME"
            cd "$OLDPWD"
            ZIP_URL="https://github.com/${REPO}/archive/refs/heads/${BRANCH_NAME_ZIP}.zip"
          fi

          echo "download_url=${DOWNLOAD_URL}" >> $GITHUB_OUTPUT
          echo "zip_url=${ZIP_URL}" >> $GITHUB_OUTPUT

      # ---------- player HTML generation ----------
      - name: 🎨 Generate Video Player HTML
        if: ${{ github.event.inputs.type == 'video' }}
        run: |
          if [ ! -f hls.min.js ]; then
            echo "📥 Downloading hls.min.js from CDN..."
            curl -sSL -o hls.min.js https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js
          fi

          REPO="${{ github.repository }}"
          BASE_URL="https://raw.githubusercontent.com/${REPO}/refs/heads/${BRANCH_NAME_STREAM}"
          DOWNLOAD_URL="${{ steps.download.outputs.download_url }}"

          PLAYLIST_URL="${BASE_URL}/master.m3u8"
          if [[ "${{ steps.process_video.outputs.has_subtitles }}" != "true" ]]; then
              PLAYLIST_URL="${BASE_URL}/playlist.m3u8"
          fi

          ORIGINAL_FILENAME=$(sed -n '2p' /tmp/metadata.txt)

          sed -e "s|__PLAYLIST_URL__|${PLAYLIST_URL}|g" \
              -e "s|__ZIP_URL__|${DOWNLOAD_URL}|g" \
              -e "s|__VIDEO_TITLE__|${ORIGINAL_FILENAME}|g" \
              player-template.html > /tmp/player.html

          python3 -c "
          content = open('/tmp/player.html').read()
          lib = open('hls.min.js').read()
          content = content.replace('__HLS_JS__', lib)
          with open('/tmp/player.html', 'w') as f:
              f.write(content)
          "
          cp /tmp/player.html ./player.html

          # ---- Write metadata for the bot ----
          ZIP_URL="${{ steps.download.outputs.zip_url }}"
          SEGMENTS_JSON="${{ steps.video_segments.outputs.segments_json }}"
          if [ -z "$SEGMENTS_JSON" ] || [ "$SEGMENTS_JSON" = "[]" ]; then
            jq -n \
              --arg download "$DOWNLOAD_URL" \
              --arg zip "$ZIP_URL" \
              --arg playlist "$PLAYLIST_URL" \
              '{"download_url":$download, "zip_url":$zip, "playlist_url":$playlist, "segments":[]}' > metadata.json
          else
            jq -n \
              --arg download "$DOWNLOAD_URL" \
              --arg zip "$ZIP_URL" \
              --arg playlist "$PLAYLIST_URL" \
              --argjson segments "$SEGMENTS_JSON" \
              '{"download_url":$download, "zip_url":$zip, "playlist_url":$playlist, "segments":$segments}' > metadata.json
          fi

      - name: 🎨 Generate Audio Player HTML
        if: ${{ github.event.inputs.type == 'audio' }}
        run: |
          REPO="${{ github.repository }}"
          BASE_URL="https://raw.githubusercontent.com/${REPO}/refs/heads/${BRANCH_NAME_STREAM}"
          AUDIO_URL="${BASE_URL}/audio.mp3"
          DOWNLOAD_URL="${{ steps.download.outputs.download_url }}"
          FILENAME=$(sed -n '2p' /tmp/metadata.txt)

          sed -e "s|__AUDIO_URL__|${AUDIO_URL}|g" \
              -e "s|__ZIP_URL__|${DOWNLOAD_URL}|g" \
              -e "s|__AUDIO_TITLE__|${FILENAME}|g" \
              audio-player-template.html > /tmp/audio-player.html
          cp /tmp/audio-player.html ./audio-player.html

          # ---- Write metadata for the bot ----
          ZIP_URL="${{ steps.download.outputs.zip_url }}"
          jq -n --arg download "$DOWNLOAD_URL" --arg zip "$ZIP_URL" --arg playlist "" \
             '{"download_url":$download, "zip_url":$zip, "playlist_url":$playlist}' > metadata.json

      # ---------- push all three branches in parallel ----------
      - name: 🚀 Push All Branches (parallel)
        if: ${{ steps.download.outputs.download_url != '' }}
        run: |
          set -euo pipefail
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          # Helper function: batched push to a branch
          batched_push() {
            local STAGING_DIR="$1"
            local BRANCH_NAME="$2"
            local BATCH_SIZE="$3"

            if [ -z "$(ls -A "$STAGING_DIR" 2>/dev/null)" ]; then
              echo "ℹ️  No files to push for branch '${BRANCH_NAME}'"
              return 0
            fi

            local ORPHAN_DIR=$(mktemp -d)
            cp -a "$STAGING_DIR"/* "$ORPHAN_DIR/"
            cd "$ORPHAN_DIR"
            git init --initial-branch=main
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git remote add origin "$REPO_URL"

            mapfile -t FILES < <(ls -1)
            local TOTAL=${#FILES[@]}
            local FIRST=0
            local COMMIT_COUNT=0
            local PUSH_OK=false

            while [ $FIRST -lt $TOTAL ]; do
              BATCH=("${FILES[@]:$FIRST:$BATCH_SIZE}")
              git add -- "${BATCH[@]}"
              git commit -m "chore: ${BRANCH_NAME} part $((COMMIT_COUNT+1)) [skip ci]" || { echo "ℹ️ Empty batch"; break; }
              COMMIT_COUNT=$((COMMIT_COUNT+1))
              echo "🚀 Pushing ${BRANCH_NAME} batch $COMMIT_COUNT (${#BATCH[@]} files)"

              for attempt in 1 2 3 4; do
                if [ $COMMIT_COUNT -eq 1 ]; then
                  git push origin "HEAD:${BRANCH_NAME}" --force && PUSH_OK=true && break
                else
                  git push origin "HEAD:${BRANCH_NAME}" && PUSH_OK=true && break
                fi
                echo "⚠️ Push attempt $attempt failed, retrying in $((2 ** (attempt-1)))s..."
                sleep $((2 ** (attempt-1)))
              done

              if ! $PUSH_OK; then
                echo "❌ All push attempts failed for ${BRANCH_NAME} batch $COMMIT_COUNT"
                return 1
              fi
              FIRST=$((FIRST + BATCH_SIZE))
            done

            if ! git ls-remote origin "refs/heads/${BRANCH_NAME}" | grep -q "${BRANCH_NAME}"; then
              echo "❌ Branch ${BRANCH_NAME} not found after push"
              return 1
            fi
            echo "✅ Branch '${BRANCH_NAME}' pushed"
          }

          # Stream staging (HLS + player + metadata + video segments)
          STREAM_STAGING=$(mktemp -d)
          if [[ "${{ github.event.inputs.type }}" == 'video' ]]; then
            cp /tmp/hls/*.m4s "$STREAM_STAGING/" 2>/dev/null || true
            cp /tmp/hls/init.mp4 "$STREAM_STAGING/" 2>/dev/null || true
            cp /tmp/hls/*.m3u8 "$STREAM_STAGING/" 2>/dev/null || true
            cp /tmp/subtitles.vtt "$STREAM_STAGING/" 2>/dev/null || true
            cp /tmp/player.html "$STREAM_STAGING/"
            # Copy video segments (Bale delivery)
            if [ -d ./segment-staging ]; then
              cp ./segment-staging/seg_*.mp4 "$STREAM_STAGING/" 2>/dev/null || true
            fi
          else
            cp /tmp/audio/audio.mp3 "$STREAM_STAGING/"
            cp /tmp/audio-player.html "$STREAM_STAGING/"
          fi
          cp metadata.json "$STREAM_STAGING/"

          # Launch all three pushes in parallel
          batched_push "./download-staging" "$BRANCH_NAME_DOWNLOAD" 25 &
          PID_DL=$!

          batched_push "./zip-staging" "$BRANCH_NAME_ZIP" 25 &
          PID_ZIP=$!

          batched_push "$STREAM_STAGING" "$BRANCH_NAME_STREAM" 50 &
          PID_STREAM=$!

          # Wait for all
          FAILED=0
          wait $PID_DL || { echo "❌ Download branch push failed"; FAILED=1; }
          wait $PID_ZIP || { echo "❌ ZIP branch push failed"; FAILED=1; }
          wait $PID_STREAM || { echo "❌ Stream branch push failed"; FAILED=1; }

          if [ $FAILED -eq 1 ]; then
            echo "❌ One or more branch pushes failed"
            exit 1
          fi

          echo "✅ All branches pushed successfully"

      # ---------- summary ----------
      - name: 📋 Summary
        run: |
          REPO="${{ github.repository }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [[ "${{ github.event.inputs.type }}" == 'video' ]]; then
            echo "🎬 Player page: https://raw.githubusercontent.com/${REPO}/refs/heads/${BRANCH_NAME_STREAM}/player.html"
            echo "📥 Direct HLS playlist: https://raw.githubusercontent.com/${REPO}/refs/heads/${BRANCH_NAME_STREAM}/playlist.m3u8"
          else
            echo "🎵 Audio page: https://raw.githubusercontent.com/${REPO}/refs/heads/${BRANCH_NAME_STREAM}/audio-player.html"
          fi
          echo "📦 Download: ${{ steps.download.outputs.download_url }}"
          if [[ -n "${{ steps.download.outputs.zip_url }}" ]]; then
            echo "🗜️  ZIP: ${{ steps.download.outputs.zip_url }}"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "ℹ️ Branches auto-deleted after 3 hours by cleanup workflow."
